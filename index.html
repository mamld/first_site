<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f77600b8df.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="header_left">
            <h1>Ліза</h1>
            <div class="bio">
                <p>Вчитель у Logika</p>
                <p>Вчк створювати цікаві та приваблюючі програми та сайти.</p>
            </div>
        </div>
        <div class="header_right">
            <div class="header_btn" id="scrollBtn">
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>
    </header>
    <main>
        <section class="skills" id="skillsSection">
            <h1>Навички</h1>
            <div class="section_row" >
                <div class="section_item">
                    <img src="html_logo.png" alt="">
                </div>
                <div class="section_item">
                    <img src="css_logo.png" alt="">
                </div>
                <div class="section_item">
                    <img src="js_logo.png" alt="">
                </div>
            </div>
        </section>
        <section class="projects">
            <h1>Проєкти</h1>
            <div class="section_row">
                <div class="section_item github" id="ghBtn">
                    <img src="github_logo.png" alt="">
                </div>
            </div>
        </section>
        <section class="contacts">
            <h1>Контакти</h1>
            <div class="section_row">
                <div class="section_item" id="instaBtn">
                    <img src="Instagram_icon.png.webp" alt="">
                </div>
                <div class="section_item" id="tgBtn">
                    <img src="tg_logo.svg" alt="">
                </div>
                <div class="section_item" id="emailBtn">
                    <img src="email_logo.png" alt="">
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer_content">
            Створено мною в 2024 | Logika
        </div>
    </footer>
    <script src="anime.min.js"></script>
</body>
</html>
